<app-header></app-header>

<app-mobile-admin-menu
  class="scroll-aware-menu"
  [menuItems]="menuItems"
></app-mobile-admin-menu>
<section class="banner-section">
  <div class="container">
    <div class="banner">
      <div class="banner-content">
        <h1>🎙️ Your Voice. Your Story.</h1>
        <p>
          Discover, share, and host powerful podcasts—all in one vibrant space.
        </p>
        <div class="banner-buttons">
          <button class="cta primary">🎧 Listen Now</button>
          <button class="cta secondary">🎤 Start Hosting</button>
        </div>
      </div>
      <div class="banner-visual">
        <img
          src="https://picsum.photos/id/1003/1920/1080"
          alt="Banner visual"
        />
        <div class="wave-animation"></div>
      </div>
    </div>
  </div>
</section>
<p-paginator
  (onPageChange)="onPageChange($event)"
  [first]="first"
  [rows]="rows"
  [totalRecords]="episodeService.episodes().length || 15"
  [rowsPerPageOptions]="[5, 10, 15]"
/>

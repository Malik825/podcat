<div class="panda-container">
  <div class="panda">
    <div class="ear"></div>
    <div class="face">
      <div class="eye-shade"></div>
      <div class="eye-white"><div class="eye-ball"></div></div>
      <div class="eye-shade rgt"></div>
      <div class="eye-white rgt"><div class="eye-ball"></div></div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
    <div class="body"></div>
    <div class="hand"></div>
    <div class="hand rgt"></div>
    <div class="foot"><div class="finger"></div></div>
    <div class="foot rgt"><div class="finger"></div></div>
  </div>
</div>

<!-- Form Card -->
<div class="admin-playlist-form">
  <h2>Panda Login</h2>
  <form>
    <div class="form-group">
      <input type="text" class="form-control" required />
      <label class="form-label">Username</label>
    </div>
    <div class="form-group">
      <input type="password" class="form-control" required />
      <label class="form-label">Password</label>
    </div>
    <div class="form-actions">
      <button class="btn">Login</button>
    </div>
  </form>
</div>

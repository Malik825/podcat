<div class="admin-playlists">
  <div class="header">
    <h2>📂 All Playlists</h2>
    <a routerLink="/admin/playlists/new" class="btn-new"> ➕ New Playlist </a>
  </div>

  <div *ngIf="loading()" class="loading">Loading playlists...</div>
  <div *ngIf="error()" class="error">{{ error() }}</div>

  <div *ngIf="!loading() && playlists().length > 0" class="playlist-grid">
    <div *ngFor="let playlist of playlists()" class="playlist-card">
      <h3>{{ playlist.name }}</h3>
      <p>{{ playlist.description }}</p>

      <div class="actions">
        <a
          [routerLink]="['/admin/playlists', playlist.id, 'edit']"
          class="btn-edit"
          >✏️ Edit</a
        >
        <button (click)="deletePlaylist(playlist.id)" class="btn-delete">
          🗑️ Delete
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading() && playlists().length === 0" class="empty">
    No playlists available.
  </div>
</div>

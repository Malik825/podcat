<div class="playlists-page">
  <h2>📂 All Playlists</h2>

  <div *ngIf="loading()" class="status loading">Loading playlists...</div>
  <div *ngIf="error()" class="status error">{{ error() }}</div>

  <div *ngIf="!loading() && playlists().length > 0" class="playlist-grid">
    <div *ngFor="let playlist of playlists()" class="playlist-card">
      <h3>{{ playlist.title }}</h3>
      <p>{{ playlist.description }}</p>
      <p>🎧 Episodes: {{ playlist.episodes.length }}</p>
    </div>
  </div>

  <div *ngIf="!loading() && playlists().length === 0" class="status empty">
    No playlists available.
  </div>
</div>
